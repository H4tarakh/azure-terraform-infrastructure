name: Deploy to Azure VM

on:
  workflow_run:
    workflows: ["Docker CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}

          script: |
            sudo docker pull h4tarakh/hariom-devops:latest

            sudo docker stop hariom-web || true

            sudo docker rm hariom-web || true

            sudo docker run -d \
              --name hariom-web \
              -p 80:80 \
              --restart always \
              h4tarakh/hariom-devops:latest