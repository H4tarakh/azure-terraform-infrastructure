name: Terraform CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: Terraform CI
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
      TF_VAR_rg_name: ${{ vars.TF_VAR_RG_NAME }}
      TF_VAR_vm_size: ${{ vars.TF_VAR_VM_SIZE }}
      TF_VAR_admin_username: ${{ vars.TF_VAR_ADMIN_USERNAME }}
      TF_VAR_public_key: ${{ vars.TF_VAR_PUBLIC_KEY }}
      TF_VAR_identity_name: ${{ vars.TF_VAR_IDENTITY_NAME }}
      TF_VAR_role_definition_name: ${{ vars.TF_VAR_ROLE_DEFINITION_NAME }}
      TF_VAR_storage_account_name: ${{ vars.TF_VAR_STORAGE_ACCOUNT_NAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: v1.15.7

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color